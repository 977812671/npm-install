name: Runner Communication Probe
on:
  push:
    branches: [master]
permissions:
  contents: read
  actions: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Probe runner communication
        continue-on-error: true
        run: |
          mkdir -p dist
          
          echo "=== 1. Runner config ===" > dist/comm.txt
          cat /home/runner/actions-runner/.runner 2>/dev/null >> dist/comm.txt
          cat /home/runner/actions-runner/.env 2>/dev/null >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 2. Runner service URL ===" >> dist/comm.txt
          cat /home/runner/actions-runner/.service 2>/dev/null >> dist/comm.txt
          cat /home/runner/actions-runner/service/*.json 2>/dev/null | head -50 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 3. Active connections from runner ===" >> dist/comm.txt
          ss -tnp 2>/dev/null | grep -v "127.0.0.1\|::1\|172.17" | head -30 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 4. DNS lookups ===" >> dist/comm.txt
          for host in api.github.com actions.githubusercontent.com github.com pipelines.actions.githubusercontent.com; do
            echo "$host:" >> dist/comm.txt
            nslookup $host 2>/dev/null | grep -A1 "Name\|Address" >> dist/comm.txt
          done
          
          echo "" >> dist/comm.txt
          echo "=== 5. Check running Docker containers ===" >> dist/comm.txt
          docker ps 2>/dev/null >> dist/comm.txt
          echo "---" >> dist/comm.txt
          docker container ls -a 2>/dev/null | head -20 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 6. Docker compose / networks ===" >> dist/comm.txt
          docker network ls 2>/dev/null >> dist/comm.txt
          echo "---" >> dist/comm.txt
          docker network inspect bridge 2>/dev/null | head -30 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 7. Check firewall/squid proxy config ===" >> dist/comm.txt
          # The firewall agent images probably have proxy settings
          docker run --rm --entrypoint=/bin/sh ghcr.io/github/gh-aw-firewall/squid -c '
            echo "--- Squid config ---"
            grep -i "http_port\|acl\|http_access\|cache_peer" /etc/squid/squid.conf 2>/dev/null | head -20
            echo "--- env proxy ---"
            env | grep -i proxy
          ' 2>&1 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== 8. Runner Listener process details ===" >> dist/comm.txt
          ps aux | grep Runner.Listener | grep -v grep >> dist/comm.txt
          lsof -p $(pgrep -f Runner.Listener) 2>/dev/null | head -20 >> dist/comm.txt
          
          echo "" >> dist/comm.txt
          echo "=== DONE ===" >> dist/comm.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: comm-results
          path: dist/
