name: Strace HCA Traffic
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          HCA_PID=$(pgrep -f hosted-compute-agent)
          echo "HCA PID: $HCA_PID"
          
          # strace the HCA for 3 seconds, capture all read/write syscalls
          sudo strace -qq -p $HCA_PID -e trace=write,writev,sendto,sendmsg -s 65535 2>&1 | head -200 &
          STRACE_PID=$!
          sleep 3
          kill $STRACE_PID 2>/dev/null
          wait $STRACE_PID 2>/dev/null
          echo "=== strace done ==="
