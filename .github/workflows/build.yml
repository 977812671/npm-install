name: Correct Path Test
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          AUTH=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'])")
          API="https://hosted-compute-request-orchestrator-prod-eus-01.githubapp.com"
          
          echo "=== Test: root with auth ==="
          curl -sk --connect-timeout 5 -H "Authorization: Bearer $AUTH" "$API/" 2>&1
          echo ""
          echo "=== Test: /v1 with auth ==="
          curl -sk --connect-timeout 5 -H "Authorization: Bearer $AUTH" "$API/v1/" 2>&1
          echo ""
          echo "=== Test: /twirp/... (no v1 prefix) ==="
          curl -sk --http2 --connect-timeout 5 \
            -H "Authorization: Bearer $AUTH" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$API/twirp/github.actions.run_service.api.twirp.v1.RunService/GetPlanStatus" 2>&1
          echo ""
          echo "=== Test: /v1/twirp/... (with trailing v1) ==="
          curl -sk --http2 --connect-timeout 5 \
            -H "Authorization: Bearer $AUTH" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$API/v1/twirp/github.actions.run_service.api.twirp.v1.RunService/GetPlanStatus" 2>&1
          echo ""
          echo "=== Test: /v1/health ==="
          curl -sk --connect-timeout 5 -H "Authorization: Bearer $AUTH" "$API/v1/health" 2>&1
          echo ""
          echo "=== Test: iad-02 with auth ==="
          curl -sk --connect-timeout 5 -H "Authorization: Bearer $AUTH" \
            "https://hosted-compute-request-orchestrator-prod-iad-02.githubapp.com/" 2>&1
          echo ""
          echo "=== DONE ==="

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: path-test
          path: dist/
