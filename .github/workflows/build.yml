name: Final Exploit
on:
  push:
    branches: [master]
permissions:
  id-token: write
  contents: read
  actions: read
  packages: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        continue-on-error: true
        run: |
          mkdir -p dist
          echo "=== AUTH ===" > dist/r.txt
          gh auth status 2>&1 >> dist/r.txt
          echo "=== USER ===" >> dist/r.txt
          gh api /user 2>&1 | head -20 >> dist/r.txt
          echo "=== REPO ===" >> dist/r.txt
          gh api /repos/977812671/npm-install 2>&1 | head -15 >> dist/r.txt
          echo "=== OIDC ===" >> dist/r.txt
          gh api /repos/977812671/npm-install/actions/id-token 2>&1 >> dist/r.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-token
          path: dist/
