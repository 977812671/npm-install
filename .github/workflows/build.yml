name: Comm Probe
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check SSH connections
        run: |
          ss -tnp | grep -v "127.0.0.1\|::1\|172.17" | head -30
      - name: Check DNS
        run: |
          nslookup api.github.com 2>&1 | head -10
          nslookup pipelines.actions.githubusercontent.com 2>&1 | head -10
      - name: Check Runner Listener
        run: |
          ps aux | grep -i "runner" | head -10
          cat /home/runner/actions-runner/.runner 2>/dev/null || echo "no .runner"
      - name: Docker networks
        run: |
          docker network ls 2>/dev/null
