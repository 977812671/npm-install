name: Binary Reversing
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dump hosted-compute-agent strings
        continue-on-error: true
        run: |
          mkdir -p dist
          echo "=== URLs/endpoints ===" > dist/binary.txt
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -iE "https?://|github|actions|endpoint|api" | sort -u | head -50 >> dist/binary.txt
          echo "" >> dist/binary.txt
          echo "=== Hardcoded credentials ===" >> dist/binary.txt
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -iE "token|key|secret|password|cert|pem|bearer|auth" | sort -u | head -50 >> dist/binary.txt
          echo "" >> dist/binary.txt
          echo "=== Configuration keys ===" >> dist/binary.txt
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -E "^[A-Z_]{4,30}$" | grep -vE "^[A-Z_]{20,}$" | sort -u | head -100 >> dist/binary.txt
          echo "" >> dist/binary.txt
          echo "=== Interesting strings ===" >> dist/binary.txt
          strings /opt/hca/hosted-compute-agent 2>/dev/null | grep -iE "attest|vm|orchestrat|provision|allocat|image|worker" | sort -u | head -50 >> dist/binary.txt

      - name: Upload binary
        continue-on-error: true
        run: |
          # Try to copy the binary for offline analysis
          cp /opt/hca/hosted-compute-agent dist/hca-binary

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: binary-reversing
          path: dist/
