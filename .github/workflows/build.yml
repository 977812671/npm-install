name: Final Strace
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          mkdir -p dist
          HCA_PID=$(pgrep -f hosted-compute-agent)
          echo "PID=$HCA_PID" > dist/out.txt
          sudo strace -qq -p $HCA_PID -e trace=write,writev -s 65535 2>&1 &
          SPID=$!
          sleep 8
          kill $SPID 2>/dev/null; wait $SPID 2>/dev/null
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: strace
          path: dist/
          if-no-files-found: warn
