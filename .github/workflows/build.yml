name: Capture HCA Traffic
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          HCA_PID=$(pgrep -f hosted-compute-agent)
          echo "HCA PID: $HCA_PID"
          
          # Start tcpdump in background, capture HCA's traffic
          sudo tcpdump -i any -s 0 -X -c 50 host 20.75.202.224 2>/dev/null &
          TCPDUMP_PID=$!
          sleep 30  # Capture for 30 seconds
          kill $TCPDUMP_PID 2>/dev/null
          wait $TCPDUMP_PID 2>/dev/null
          
          echo "=== tcpdump done ==="
