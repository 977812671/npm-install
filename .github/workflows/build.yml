name: strace HCA
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          HCA_PID=$(pgrep -f hosted-compute-agent)
          echo "HCA PID: $HCA_PID"
          
          # Use strace to capture HCA's network send/recv for 2 seconds
          timeout 3 strace -qq -p $HCA_PID -e trace=read,write,writev,sendto,recvfrom -s 4096 2>&1 | head -50
