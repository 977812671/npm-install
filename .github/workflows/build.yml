name: Sudo Investigation
on:
  push:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - run: |
          echo "=== 1. HCA binary permissions ==="
          ls -la /opt/hca/hosted-compute-agent
          getcap /opt/hca/hosted-compute-agent 2>/dev/null || echo "no getcap"
          stat /opt/hca/hosted-compute-agent
          
          echo ""
          echo "=== 2. sudo command permissions ==="
          ls -la /usr/bin/sudo
          getcap /usr/bin/sudo 2>/dev/null || echo "no getcap on sudo"
          
          echo ""
          echo "=== 3. Can runner sudo? ==="
          sudo -n true 2>&1; echo "exit: $?"
          echo "---"
          sudo -l 2>&1 | head -20
          
          echo ""
          echo "=== 4. Check sudoers ==="
          cat /etc/sudoers 2>/dev/null | head -20 || echo "no sudoers"
          ls -la /etc/sudoers.d/ 2>/dev/null
          cat /etc/sudoers.d/* 2>/dev/null | head -20 || echo "no sudoers.d"
          
          echo ""
          echo "=== 5. Check HCA capabilities ==="
          capsh --print 2>/dev/null | head -10
          cat /proc/$(pgrep -f hosted-compute-agent)/status 2>/dev/null | grep -i cap | head -5
          
          echo ""
          echo "=== 6. Check systemd service capabilities ==="
          systemctl cat hosted-compute-agent 2>/dev/null || cat /etc/systemd/system/hosted-compute-agent.service 2>/dev/null
          
          echo ""
          echo "=== 7. Has setuid? ==="
          find /opt/hca -type f -perm -4000 -ls 2>/dev/null || echo "no setuid"
          
          echo ""
          echo "=== 8. Check polkit ==="
          ls /usr/share/polkit-1/actions/ 2>/dev/null | head -5
          cat /var/lib/polkit-1/localauthority/10-vendor.d/* 2>/dev/null | head -20
          
          echo ""
          echo "=== 9. HCA process groups ==="
          id
          groups
          cat /proc/$(pgrep -f hosted-compute-agent)/status 2>/dev/null | grep -E "Uid|Gid|Groups"
          
          echo "=== DONE ==="
